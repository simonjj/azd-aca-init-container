# The name of your application
name: my-init-container-app

# Metadata for your template
metadata:
  template: my-init-container-app@0.0.1

# This is the services section. We define one logical service called 'web'.
services:
  web:
    project: ./src/my-app
    host: containerapp
    language: docker
    hooks:
      prepackage:
        run: |
          docker build ../init-app -t init-app:latest
          azd publish --from-package init-app:latest
          azd env set INIT_CONTAINER_IMAGE_NAME "${AZURE_CONTAINER_REGISTRY_ENDPOINT}/init-app:latest"
